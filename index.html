<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap 4 Input Groups Example</title>

  <!-- Bootstrap 4 CSS -->
  <link rel="stylesheet"
        href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

  <!-- Bootstrap Icons (optional) -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

  <style>
    body {
      padding: 30px;
    }
    .section {
      margin-bottom: 40px;
    }
  </style>
</head>
<body>

  <h2 class="mb-4">Bootstrap 4 Input Group Examples</h2>

  <!-- 1. Basic Text Addon -->
  <div class="section">
    <h5>Basic Text Addon</h5>
    <div class="input-group mb-3">
      <div class="input-group-prepend">
        <span class="input-group-text">@</span>
      </div>
      <input type="text" class="form-control" placeholder="Username">
    </div>
  </div>

  <!-- 2. Addon on Right -->
  <div class="section">
    <h5>Text Addon on Right</h5>
    <div class="input-group mb-3">
      <input type="text" class="form-control" placeholder="Enter amount">
      <div class="input-group-append">
        <span class="input-group-text">.00</span>
      </div>
    </div>
  </div>

  <!-- 3. Addons on Both Sides -->
  <div class="section">
    <h5>Addons on Both Sides</h5>
    <div class="input-group mb-3">
      <div class="input-group-prepend">
        <span class="input-group-text">$</span>
      </div>
      <input type="text" class="form-control">
      <div class="input-group-append">
        <span class="input-group-text">.00</span>
      </div>
    </div>
  </div>

  <!-- 4. With Buttons -->
  <div class="section">
    <h5>Input Group with Buttons</h5>
    <div class="input-group mb-3">
      <div class="input-group-prepend">
        <button class="btn btn-outline-secondary" type="button">Go</button>
      </div>
      <input type="text" class="form-control" placeholder="Search...">
    </div>

    <div class="input-group mb-3">
      <input type="text" class="form-control">
      <div class="input-group-append">
        <button class="btn btn-outline-success" type="button">Submit</button>
      </div>
    </div>
  </div>

  <!-- 5. With Icon Addon -->
  <div class="section">
    <h5>Icon Addon</h5>
    <div class="input-group mb-3">
      <div class="input-group-prepend">
        <span class="input-group-text"><i class="fas fa-search"></i></span>
      </div>
      <input type="text" class="form-control" placeholder="Search...">
    </div>
  </div>

  <!-- 6. Multiple Addons -->
  <div class="section">
    <h5>Multiple Addons</h5>
    <div class="input-group mb-3">
      <div class="input-group-prepend">
        <span class="input-group-text">$</span>
        <span class="input-group-text">0.00</span>
      </div>
      <input type="text" class="form-control">
      <div class="input-group-append">
        <span class="input-group-text">EX</span>
      </div>
    </div>
  </div>

  <!-- 7. Sizing Variations -->
  <div class="section">
    <h5>Sizing Variations</h5>
    <div class="input-group input-group-lg mb-3">
      <div class="input-group-prepend">
        <span class="input-group-text">Large</span>
      </div>
      <input type="text" class="form-control" placeholder="Large input">
    </div>

    <div class="input-group input-group-sm">
      <div class="input-group-prepend">
        <span class="input-group-text">Small</span>
      </div>
      <input type="text" class="form-control" placeholder="Small input">
    </div>
  </div>

  <!-- 8. Checkbox & Radio Addons -->
  <div class="section">
    <h5>Checkbox & Radio Addons</h5>

    <div class="input-group mb-3">
      <div class="input-group-prepend">
        <div class="input-group-text">
          <input type="checkbox">
        </div>
      </div>
      <input type="text" class="form-control" placeholder="Checkbox addon">
    </div>

    <div class="input-group">
      <div class="input-group-prepend">
        <div class="input-group-text">
          <input type="radio" aria-label="Radio">
        </div>
      </div>
      <input type="text" class="form-control" placeholder="Radio addon">
    </div>
  </div>

  <!-- 9. Validation States -->
  <div class="section">
    <h5>Validation States</h5>
    <div class="input-group mb-3">
      <div class="input-group-prepend">
        <span class="input-group-text">Email</span>
      </div>
      <input type="email" class="form-control is-valid" placeholder="Valid input">
    </div>
    <div class="input-group">
      <div class="input-group-prepend">
        <span class="input-group-text">Email</span>
      </div>
      <input type="email" class="form-control is-invalid" placeholder="Invalid input">
      <div class="invalid-feedback">
        Please provide a valid email.
      </div>
    </div>
  </div>

</body>

<!-- Bootstrap 4 JS -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script
 src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>

</html>
